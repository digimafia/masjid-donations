<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Masjid E Ibrahim</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 20px; color: #1f2937; }
        .container { background: white; max-width: 500px; margin: 0 auto; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid #fbbf24; overflow: hidden; }
        .header { background: #064e3b; color: white; text-align: center; padding: 20px; border-bottom: 4px solid #fbbf24; }
        .content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #064e3b; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #064e3b; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: #fbbf24; color: #78350f; }
        .status-box { background: #e5e7eb; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        #loadingMsg { color: #059669; font-weight: bold; display: none; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">Masjid E Ibrahim</h2>
        <p style="margin:5px 0 0 0; font-size:14px; color:#d1fae5;">Peerkankaranai, Chennai</p>
    </div>
    <div class="content">
        <form id="donationForm">
            <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
            <div class="form-group"><label>Mobile Number</label><input type="tel" id="mobile" pattern="[0-9]{10}" required></div>
            <div class="form-group"><label>Address</label><textarea id="address" rows="2" required></textarea></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="amount" min="1" required></div>
            <button type="submit" class="btn">Proceed to Pay via UPI</button>
            <p id="loadingMsg">Sending data securely... please wait.</p>
        </form>

        <hr style="margin: 25px 0; border: 0; border-top: 1px dashed #ccc;">

        <div class="status-box">
            <h3 style="margin-top:0; color: #064e3b;">Check Receipt Status</h3>
            <p style="font-size: 12px;">Enter your mobile number to download your receipt once the admin confirms payment.</p>
            <input type="tel" id="checkMobile" placeholder="Enter Mobile No." style="margin-bottom: 10px;">
            <button type="button" class="btn btn-gold" onclick="checkStatus()">Check Status</button>
            <div id="statusResult" style="margin-top: 15px; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE WEB APP URL HERE:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfRDzhY7J9k44OcKfxkoamLJBTOmEDSe5Lx3vu992PEoQhfGFM44jotYx0T6Wb9I0v/exec";
    const UPI_ID = "sherifthe6-1@okaxis";

    document.getElementById('donationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        document.getElementById('loadingMsg').style.display = 'block';

        const data = {
            action: 'add',
            id: 'MEI-' + Date.now().toString().slice(-6),
            date: new Date().toLocaleDateString('en-IN'),
            name: document.getElementById('name').value,
            mobile: document.getElementById('mobile').value,
            address: document.getElementById('address').value,
            amount: document.getElementById('amount').value
        };

        // Send to Google Sheets
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        });

        document.getElementById('loadingMsg').style.display = 'none';
        
        // Open UPI App
        const upiURI = `upi://pay?pa=${UPI_ID}&pn=Masjid E Ibrahim&am=${data.amount}&cu=INR&tn=Donation`;
        window.location.href = upiURI;
        this.reset();
    });

    async function checkStatus() {
        const mobile = document.getElementById('checkMobile').value;
        const resultDiv = document.getElementById('statusResult');
        resultDiv.innerHTML = "Checking...";

        try {
            const response = await fetch(`${SCRIPT_URL}?action=check&mobile=${mobile}`);
            const record = await response.json();

            if (!record) {
                resultDiv.innerHTML = "<span style='color:red;'>No record found for this number.</span>";
            } else if (record.status === 'Pending') {
                resultDiv.innerHTML = "<span style='color:#b45309;'>Status: Pending Admin Confirmation. Check back soon.</span>";
            } else if (record.status === 'Confirmed') {
                resultDiv.innerHTML = "<span style='color:#059669;'>Status: Confirmed! JazakAllah Khair.</span><br>";
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = 'Download PDF Receipt';
                btn.onclick = () => generatePDF(record);
                resultDiv.appendChild(btn);
            }
        } catch (error) {
            resultDiv.innerHTML = "Error checking status. Try again.";
        }
    }

    function generatePDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setDrawColor(6, 78, 59); doc.setLineWidth(1); doc.rect(10, 10, 190, 130);
        doc.setTextColor(6, 78, 59); doc.setFontSize(22); doc.setFont("helvetica", "bold");
        doc.text("Masjid E Ibrahim", 105, 25, null, null, "center");
        doc.setFontSize(12); doc.setFont("helvetica", "normal");
        doc.text("(Sunnath Jamath) | Peerkankaranai, Chennai - 600063", 105, 32, null, null, "center");
        doc.setLineWidth(0.5); doc.line(20, 40, 190, 40);
        doc.setTextColor(0, 0, 0); doc.setFontSize(16); doc.setFont("helvetica", "bold");
        doc.text("DONATION RECEIPT", 105, 50, null, null, "center");
        doc.setFontSize(12); doc.setFont("helvetica", "normal");
        doc.text(`Receipt No: ${data.id}`, 20, 65); doc.text(`Date: ${data.date}`, 20, 75);
        doc.text(`Received from:`, 20, 90); doc.setFont("helvetica", "bold"); doc.text(data.name, 60, 90);
        doc.setFont("helvetica", "normal"); doc.text(`Mobile:`, 20, 100); doc.text(data.mobile.toString(), 60, 100);
        doc.text(`Address:`, 20, 110); doc.text(doc.splitTextToSize(data.address, 120), 60, 110);
        doc.setFontSize(14); doc.text(`Amount:`, 20, 125); doc.setFont("helvetica", "bold"); doc.text(`Rs. ${data.amount} /-`, 60, 125);
        doc.setFontSize(10); doc.setFont("helvetica", "italic");
        doc.text("* May Allah accept your contribution. This is a computer-generated receipt.", 105, 145, null, null, "center");
        doc.save(`Receipt_${data.name}.pdf`);
    }
</script>
</body>

</html>
